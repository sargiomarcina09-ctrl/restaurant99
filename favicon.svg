];

const menuItems: MenuItem[] = [
  {
    id: 1,
    name: "Truffle Saffron Risotto",
    category: "Veg",
    price: 1180,
    rating: 4.9,
    image:
      "https://images.unsplash.com/photo-1476124369491-e7addf5db371?auto=format&fit=crop&w=900&q=80",
    description: "Aged arborio rice, Kashmiri saffron, parmesan cloud, shaved black truffle.",
    tag: "Chef signature",

"use client";

import { AnimatePresence, motion, useScroll, useTransform } from "framer-motion";
import type { LucideIcon } from "lucide-react";
import {
  ArrowUp,
  Bot,
  CalendarDays,
  Camera,
  Check,
  ChefHat,
  Clock3,
  Download,
  Filter,
  Heart,
  Mail,
  MapPin,
  Menu,
  Minus,
  Music,
  Phone,
  Plus,
  Search,
  ShoppingBag,
  Sparkles,
  Star,
  Utensils,
  X,
} from "lucide-react";
import { FormEvent, useMemo, useState } from "react";

type MenuItem = {
  id: number;
  name: string;
  category: "Veg" | "Non Veg" | "Desserts" | "Drinks";
  price: number;
  rating: number;
  image: string;
  description: string;
  tag: string;
};

type Lead = {
  id: string;
  type: "Reservation" | "Order" | "Contact" | "Newsletter";
  name: string;
  phone: string;
  email: string;
  status: "New" | "Confirmed" | "Preparing" | "Closed";
  amount?: number;
  note: string;
};

const heroImage =
  "https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=2200&q=85";

const galleryImages = [
  "https://images.unsplash.com/photo-1414235077428-338989a2e8c0?auto=format&fit=crop&w=900&q=80",
  "https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=900&q=80",
  "https://images.unsplash.com/photo-1551218808-94e220e084d2?auto=format&fit=crop&w=900&q=80",
  "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=900&q=80",
  "https://images.unsplash.com/photo-1550966871-3ed3cdb5ed0c?auto=format&fit=crop&w=900&q=80",
